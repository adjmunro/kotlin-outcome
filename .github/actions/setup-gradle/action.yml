name: 'Setup Gradle'
description: 'Sets up Java and Gradle for Kotlin/Java projects.'
runs:
  using: 'composite'
  steps:
    - name: Setup Java
      uses: ./.github/actions/setup-java

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        add-job-summary-as-pr-comment: on-failure
